<!DOCTYPE html>
<html><head><meta charset="utf-8"><style>
body{margin:0;background:#222;display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
figure{margin:0}video{width:100%;display:block}
figcaption{color:#fff;font:12px monospace;padding:4px}
</style></head><body>
<figure><figcaption>video1</figcaption><video id="v1" src="assets/video1.mp4" muted preload="auto"></video></figure>
<figure><figcaption>video2</figcaption><video id="v2" src="assets/video2.mp4" muted preload="auto"></video></figure>
<figure><figcaption>video3</figcaption><video id="v3" src="assets/video3.mp4" muted preload="auto"></video></figure>
<script>
function seekAll(t){ ['v1','v2','v3'].forEach(function(id){
  var v=document.getElementById(id);
  v.currentTime = t < 0 ? Math.max(0, v.duration + t) : t;
});}
</script>
</body></html>
